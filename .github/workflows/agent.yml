import json

print("🤖 AI AGENT STARTED")

chats = [
    {"title": "Минск Новости", "members": 12000, "desc": "новости города"},
    {"title": "Crypto Spam", "members": 300, "desc": "BUY NOW $$$"},
    {"title": "Tech Chat", "members": 5400, "desc": "tech talk"}
]

def score(chat):
    s = 0

    if chat.get("members", 0) > 5000:
        s += 40
    if "buy" in chat.get("desc", "").lower():
        s -= 30
    if "spam" in chat.get("title", "").lower():
        s -= 40

    return max(0, min(100, s))

results = []

for c in chats:
    results.append({
        "title": c["title"],
        "score": score(c),
        "status": "GOOD" if score(c) > 60 else "BAD"
    })

print(json.dumps(results, indent=2, ensure_ascii=False))
