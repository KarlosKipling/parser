name: AI Agent Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # каждые 6 часов

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install openai github3.py

      - name: Run AI Agent
        run: python agent.py
