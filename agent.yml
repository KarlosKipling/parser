import json

print("🤖 AI AGENT STARTED (NO API MODE)")

# пример твоих данных (потом подключим Telegram parser)
chats = [
    {"title": "Минск Новости", "members": 12000, "desc": "новости города"},
    {"title": "Crypto Pump Spam", "members": 300, "desc": "BUY NOW $$$"},
    {"title": "Tech Chat", "members": 5400, "desc": "обсуждение технологий"}
]

def score(chat):
    s = 0

    if chat["members"] > 5000:
        s += 40
    if "buy" in chat["desc"].lower():
        s -= 30
    if "spam" in chat["title"].lower():
        s -= 50
    if "crypto" in chat["desc"].lower():
        s -= 20

    return max(0, min(100, s))

results = []

for c in chats:
    results.append({
        "title": c["title"],
        "score": score(c),
        "status": "GOOD" if score(c) > 60 else "BAD"
    })

results = sorted(results, key=lambda x: x["score"], reverse=True)

print(json.dumps(results, indent=2, ensure_ascii=False))
